<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 練習專案目錄</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --sidebar-bg: #2c3e50;
            --sidebar-hover: #34495e;
            --text-light: #ecf0f1;
            --header-bg: #1a252f;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        /* 側邊欄樣式 */
        nav {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .nav-header {
            padding: 30px 20px;
            background-color: var(--header-bg);
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-header h1 {
            font-size: 1.25rem;
            margin: 0;
            letter-spacing: 1px;
        }
        .student-id {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-top: 8px;
            font-family: monospace;
        }
        .menu {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }
        .menu-item {
            display: block;
            padding: 15px 25px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            font-size: 0.95rem;
        }
        .menu-item:hover {
            background-color: var(--sidebar-hover);
            border-left: 4px solid var(--primary-color);
            padding-left: 30px;
        }
        /* 右側 iframe 顯示區域 */
        main {
            flex: 1;
            background-color: #f5f7f9;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .welcome-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #bdc3c7;
            z-index: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="nav-header">
                <h1>Vue 課程作業</h1>
                <div class="student-id">學號：413730457
                </div>
            </div>
            <div class="menu">
                <a href="ex1/index.html" target="viewer" class="menu-item">練習 1：基礎計數器</a>
                <a href="ex2/index.html" target="viewer" class="menu-item">練習 2：資料綁定</a>
                <a href="ex3/index.html" target="viewer" class="menu-item">練習 3：事件處理</a>
                <a href="ex4/index.html" target="viewer" class="menu-item">練習 4：雙向綁定</a>
                <a href="ex5/index.html" target="viewer" class="menu-item">練習 5：條件渲染</a>
                <a href="ex6/index.html" target="viewer" class="menu-item">練習 6：列表渲染</a>
                <a href="ex7/index.html" target="viewer" class="menu-item">練習 7：計算屬性</a>
                <a href="ex8/index.html" target="viewer" class="menu-item">練習 8：樣式綁定</a>
                <a href="ex9/index.html" target="viewer" class="menu-item">練習 9：待辦清單</a>
            </div>
        </nav>
        <main>
            <div class="welcome-msg">
                <h2>歡迎點選左側選單</h2>
                <p>練習內容將會顯示在此區域</p>
            </div>
            <iframe name="viewer"></iframe>
        </main>
    </div>
</body>
</html>
